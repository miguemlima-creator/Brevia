<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <style>
    :root {
      --bg: #0E1525; --panel: #16203A; --mint: #02C39A; --ice: #E8EEF5;
      --muted: #6B7FA3; --amber: #F9B84A; --border: #2A3A5A;
    }
    * { box-sizing: border-box; }
    body {
      width: 360px; margin: 0; padding: 14px;
      background: var(--bg); color: var(--ice);
      font-family: 'Segoe UI', system-ui, sans-serif; font-size: 13px;
    }
    h1 { font-size: 15px; margin: 0 0 2px; color: var(--mint); }
    .sub { color: var(--muted); font-size: 11px; margin: 0 0 12px; }
    textarea {
      width: 100%; height: 110px; resize: vertical;
      background: var(--panel); color: var(--ice);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 8px; font-size: 12px; font-family: inherit;
    }
    .row { display: flex; gap: 8px; align-items: center; margin: 10px 0; }
    .toggle { display: flex; align-items: center; gap: 6px; color: var(--muted); font-size: 12px; }
    button {
      background: var(--mint); color: #06251D; border: none;
      border-radius: 8px; padding: 8px 12px; font-weight: 700;
      cursor: pointer; font-size: 13px; flex: 1;
    }
    button.ghost { background: transparent; color: var(--ice); border: 1px solid var(--border); font-weight: 600; }
    button:active { transform: translateY(1px); }
    .stats { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 10px; margin-top: 10px; display: none; }
    .big { font-size: 22px; font-weight: 800; color: var(--mint); }
    .stats .line { display: flex; justify-content: space-between; color: var(--muted); font-size: 11px; margin-top: 4px; }
    .stats .line b { color: var(--ice); font-weight: 600; }
    .foot { color: var(--muted); font-size: 10px; margin-top: 10px; text-align: center; }
  </style>
</head>
<body>
  <h1>Brevia</h1>
  <p class="sub">Pega tu prompt · comprímelo · copia · ahorra tokens y datos</p>

  <textarea id="in" placeholder="Pega aquí el texto que ibas a mandar al chat de IA..."></textarea>

  <div class="row">
    <label class="toggle"><input type="checkbox" id="aggr" /> Modo agresivo (quita cortesía)</label>
  </div>

  <div class="row">
    <button id="go">Comprimir</button>
    <button id="copy" class="ghost">Copiar</button>
  </div>

  <div class="stats" id="stats">
    <div class="big" id="pct">—</div>
    <div class="line"><span>Tokens</span><b id="tok">—</b></div>
    <div class="line"><span>Datos (bytes)</span><b id="byt">—</b></div>
  </div>

  <p class="foot">Conteo estimado · sirve para cualquier LLM · 100% local</p>

  <script src="brevia-engine.js"></script>
  <script src="popup.js"></script>
</body>
</html>
